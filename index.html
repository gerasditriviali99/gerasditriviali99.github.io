<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekap Pembelian BBM SAPA - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="bg-emerald-600 rounded-xl shadow-lg p-6 text-white text-center">
            <h1 class="text-3xl font-bold tracking-wide">Rekap Pembelian BBM SAPA</h1>
            <p class="text-emerald-100 mt-2">Data dan Foto Struk tersimpan otomatis di Google Cloud</p>
        </div>

        <div class="bg-white rounded-xl shadow p-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4 border-b pb-2">Form Input Pembelian</h2>
            <form id="formBBM" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Tanggal Pembelian</label>
                    <input type="date" id="tanggal" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Nomor Polisi Kendaraan</label>
                    <input type="text" id="nopol" placeholder="Misal: B 1234 ABC" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none uppercase">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Jenis BBM</label>
                    <select id="jenisBBM" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="" disabled selected>Pilih Jenis BBM</option>
                        <option value="Pertalite">Pertalite</option>
                        <option value="Pertamax">Pertamax</option>
                        <option value="Biosolar">Biosolar</option>
                        <option value="Dexlite">Dexlite</option>
                        <option value="Pertamina Dex">Pertamina Dex</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Jumlah (Liter)</label>
                    <input type="number" id="liter" step="0.01" placeholder="0.00" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-600 mb-1">Total Harga (Rp)</label>
                    <input type="number" id="harga" placeholder="Misal: 150000" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-600 mb-1">Upload Foto Struk (Opsional)</label>
                    <input type="file" id="fotoStruk" accept="image/*" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
                </div>

                <div class="md:col-span-2 mt-2">
                    <button type="submit" id="btnSimpan" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 disabled:bg-gray-400">
                        Simpan Data ke Cloud
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow p-6">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-semibold text-gray-700">Daftar Rekapitulasi</h2>
                <button onclick="muatDataDariSheets()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-1 px-3 rounded font-medium">🔄 Refresh Data</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-sm">
                            <th class="p-3 border-b">Tanggal</th>
                            <th class="p-3 border-b">No. Polisi</th>
                            <th class="p-3 border-b">Jenis BBM</th>
                            <th class="p-3 border-b">Liter</th>
                            <th class="p-3 border-b">Total Harga</th>
                            <th class="p-3 border-b">Struk</th>
                        </tr>
                    </thead>
                    <tbody id="tabelBody" class="text-sm text-gray-700">
                        <tr><td colspan="6" class="text-center p-4 text-gray-500">Sedang memuat data dari Google Sheets...</td></tr>
                    </tbody>
                    <tfoot>
                        <tr class="bg-emerald-50 font-semibold text-gray-800">
                            <td colspan="3" class="p-3 border-t text-right">Total Keseluruhan:</td>
                            <td id="totalLiter" class="p-3 border-t">0 L</td>
                            <td id="totalBiaya" class="p-3 border-t" colspan="2">Rp 0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

    </div>

    <script>
        // GANTI DENGAN URL WEB APP YANG ANDA DAPATKAN DARI GOOGLE APPS SCRIPT YANG BARU
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxIt68AXe6tY6jro2qtUNtj9_5doJUfr6rvltzZfZQDBg3h8rVU3eZ5-onekT7nWDBDew/exec";

        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };

        const formatDate = (dateString) => {
            if(!dateString) return "-";
            const date = new Date(dateString);
            if(isNaN(date.getTime())) return dateString; 
            return date.toLocaleDateString('id-ID', { year: 'numeric', month: '2-digit', day: '2-digit' });
        };

        // Fungsi untuk mengubah file gambar menjadi kode teks (Base64) agar bisa dikirim ke Google Apps Script
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // Muat Data (GET) dari Google Sheets
        async function muatDataDariSheets() {
            const tbody = document.getElementById('tabelBody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4 text-gray-500">Menghubungkan ke cloud...</td></tr>';

            try {
                const response = await fetch(WEB_APP_URL);
                const dataBBM = await response.json();
                
                tbody.innerHTML = '';
                let totalLiter = 0;
                let totalBiaya = 0;

                if (dataBBM.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4 text-gray-500">Belum ada data di Google Sheets.</td></tr>';
                } else {
                    dataBBM.forEach((item) => {
                        totalLiter += parseFloat(item.liter || 0);
                        totalBiaya += parseFloat(item.harga || 0);

                        // Cek apakah ada link foto struk
                        let linkStruk = "-";
                        if (item.foto_struk && item.foto_struk.startsWith('http')) {
                            linkStruk = `<a href="${item.foto_struk}" target="_blank" class="text-blue-500 hover:underline">Lihat</a>`;
                        }

                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50 transition border-b">
                                <td class="p-3">${formatDate(item.tanggal)}</td>
                                <td class="p-3 uppercase font-medium">${item.nopol}</td>
                                <td class="p-3">${item.jenisBBM}</td>
                                <td class="p-3">${parseFloat(item.liter).toFixed(2)} L</td>
                                <td class="p-3">${formatRupiah(item.harga)}</td>
                                <td class="p-3 font-medium">${linkStruk}</td>
                            </tr>
                        `;
                    });
                }

                document.getElementById('totalLiter').innerText = totalLiter.toFixed(2) + ' L';
                document.getElementById('totalBiaya').innerText = formatRupiah(totalBiaya);

            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4 text-red-500">Gagal mengambil data. Pastikan URL Web App benar.</td></tr>';
            }
        }

        // Kirim Data (POST) ke Google Sheets
        document.getElementById('formBBM').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnSimpan = document.getElementById('btnSimpan');
            btnSimpan.disabled = true;
            btnSimpan.innerText = "Mengupload Data & Foto...";

            let fotoBase64 = "";
            let namaFile = "";
            const fileInput = document.getElementById('fotoStruk').files[0];
            
            // Jika ada foto yang diupload, proses fotonya
            if (fileInput) {
                fotoBase64 = await getBase64(fileInput);
                const nopol = document.getElementById('nopol').value.replace(/\s+/g, '_');
                namaFile = `STRUK_${nopol}_${Date.now()}.${fileInput.name.split('.').pop()}`;
            }

            const newData = {
                tanggal: document.getElementById('tanggal').value,
                nopol: document.getElementById('nopol').value,
                jenisBBM: document.getElementById('jenisBBM').value,
                liter: document.getElementById('liter').value,
                harga: document.getElementById('harga').value,
                fotoBase64: fotoBase64, // Kirim kode gambar
                namaFile: namaFile      // Kirim nama file gambar
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(newData)
                });

                alert('Data berhasil disimpan ke Google Sheets!');
                this.reset();
                muatDataDariSheets(); // Refresh tabel
            } catch (error) {
                console.error(error);
                alert('Gagal menyimpan data ke cloud.');
            } finally {
                btnSimpan.disabled = false;
                btnSimpan.innerText = "Simpan Data ke Cloud";
            }
        });

        // Panggil fungsi muat data
        muatDataDariSheets();
    </script>
</body>
</html>
